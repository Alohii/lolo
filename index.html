<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>مراجعة الرياضيات ✨</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FFF5FA; --bg2:#FFEAF4; --panel:#FFFFFF; --panel2:#FFF0F7;
  --ink:#3A2030; --muted:#9B7A8C; --line:#F4D4E6;
  --accent:#E0518F; --accent2:#B86AD9; --accent-ink:#fff;
  --good:#22B07D; --good-bg:#E3F8EF; --bad:#E85D75; --bad-bg:#FDEBEE; --warn:#E0A030;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:linear-gradient(160deg,var(--bg),var(--bg2));color:var(--ink);font-family:'IBM Plex Sans Arabic',sans-serif;min-height:100vh;line-height:1.8}
.en,.num{font-family:'IBM Plex Mono',monospace;direction:ltr;unicode-bidi:embed}
.wrap{max-width:780px;margin:0 auto;padding:20px 16px 70px}
header.top{display:flex;align-items:center;justify-content:space-between;padding:16px 0 22px;margin-bottom:8px}
.brand{font-weight:700;font-size:20px;display:flex;align-items:center;gap:8px}
.brand small{display:block;color:var(--muted);font-weight:400;font-size:12px;margin-top:2px}
.tagchip{font-size:12px;color:var(--accent2);border:1.5px solid var(--accent2);border-radius:20px;padding:4px 12px;background:#fff}

.grid{display:grid;grid-template-columns:1fr;gap:13px}
@media(min-width:560px){.grid{grid-template-columns:1fr 1fr}}
.card{position:relative;background:var(--panel);border:1.5px solid var(--line);border-radius:18px;padding:18px;cursor:pointer;transition:transform .14s, box-shadow .14s;box-shadow:0 4px 14px rgba(224,81,143,.06)}
.card:hover{transform:translateY(-3px);box-shadow:0 10px 24px rgba(224,81,143,.16);border-color:var(--accent)}
.card .ico{font-size:24px;margin-bottom:8px}
.card h3{font-size:16px;margin-bottom:3px}
.card .sub{font-size:11px;color:var(--muted);font-family:'IBM Plex Mono',monospace;direction:ltr;text-align:right}
.card .meta{margin-top:11px;font-size:12px;color:var(--muted);display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.badge{font-size:11px;padding:2px 10px;border-radius:20px;border:1.5px solid var(--line);color:var(--muted)}
.badge.done{border-color:var(--good);color:var(--good);background:var(--good-bg)}
.badge.half{border-color:var(--warn);color:var(--warn);background:#FCF3E2}
.sechead{margin:6px 0 14px;font-size:17px;color:var(--accent);font-weight:700;display:flex;align-items:center;gap:8px}
.intro{color:var(--muted);font-size:13px;text-align:center;margin-top:26px;padding:14px;background:#fff;border-radius:16px;border:1.5px dashed var(--line)}

.backbtn{background:#fff;border:1.5px solid var(--line);color:var(--muted);border-radius:20px;padding:7px 18px;cursor:pointer;font-family:inherit;font-size:13px;margin-bottom:16px}
.backbtn:hover{color:var(--accent);border-color:var(--accent)}
h2.topic-title{font-size:22px;margin-bottom:3px}
.topic-sub{color:var(--muted);font-size:13px;margin-bottom:18px}

.qcount{font-size:12px;color:var(--muted);margin-bottom:10px;font-family:'IBM Plex Mono',monospace;direction:ltr;text-align:right}
.qbox{background:var(--panel);border:1.5px solid var(--line);border-radius:18px;padding:20px;margin-bottom:14px;box-shadow:0 4px 14px rgba(224,81,143,.05)}
.primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border:none;border-radius:14px;padding:12px 28px;font-family:inherit;font-weight:700;font-size:15px;cursor:pointer;box-shadow:0 4px 12px rgba(224,81,143,.3)}
.primary:hover{filter:brightness(1.06)}
.ghost{background:#fff;border:1.5px solid var(--line);color:var(--muted);border-radius:14px;padding:11px 22px;font-family:inherit;font-size:14px;cursor:pointer}
.ghost:hover{border-color:var(--accent);color:var(--accent)}
.nextbtn{margin-top:14px}
.scorebox{text-align:center;padding:34px 16px}
.scorebox .big{font-size:48px;font-weight:700;font-family:'IBM Plex Mono',monospace;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.actions{display:flex;gap:10px;margin-top:16px;flex-wrap:wrap}
.actions.center{justify-content:center}

.problem{font-size:16px;line-height:2;background:var(--panel2);border:1.5px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px}
.problem b{color:var(--accent)}
.problem .fig{display:block;margin:10px auto 0;max-width:240px}
.lawbox{font-size:13px;color:var(--accent2);background:#F7ECFB;border:1.5px solid #ECD6F5;border-radius:12px;padding:10px 14px;margin-bottom:14px;text-align:center;line-height:1.8}
.answerrow{display:flex;gap:10px;align-items:center;margin-bottom:6px;flex-wrap:wrap}
.answerrow label{font-size:15px;font-weight:600}
.answerrow input{flex:1;min-width:110px;background:#fff;border:2px solid var(--line);border-radius:12px;color:var(--ink);font-family:'IBM Plex Mono',monospace;font-size:16px;padding:11px 14px;direction:ltr;text-align:left}
.answerrow input:focus{outline:none;border-color:var(--accent)}
.answerrow .unit{color:var(--muted);font-size:14px;font-family:'IBM Plex Mono',monospace}
.choices{display:flex;flex-direction:column;gap:9px;margin-top:6px}
.choice{text-align:right;background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:12px 15px;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:15px;direction:ltr;color:var(--ink)}
.choice:hover{border-color:var(--accent)}
.choice.correct{border-color:var(--good);background:var(--good-bg)}
.choice.wrong{border-color:var(--bad);background:var(--bad-bg)}
.choice:disabled{cursor:default}
.solution{margin-top:14px;padding:14px 16px;border-radius:12px;font-size:15px;line-height:1.9;display:none}
.solution.ok{background:var(--good-bg);border:1.5px solid var(--good)}
.solution.no{background:var(--bad-bg);border:1.5px solid var(--bad)}
.solution.show{display:block}
.solution .step{font-family:'IBM Plex Mono',monospace;direction:ltr;text-align:left;font-size:14px;color:var(--ink);background:#fff;border-radius:8px;padding:8px 10px;margin-top:8px}
.hint-eq{font-size:12px;color:var(--muted);margin-top:6px}
svg{font-family:'IBM Plex Mono',monospace}
.star{color:var(--accent2)}
</style>
</head>
<body>
<div class="wrap">
<header class="top">
  <div class="brand">✨ مراجعة الرياضيات<small>هندسة — مراجعة شاملة</small></div>
  <div class="tagchip">مذاكرة 💜</div>
</header>
<div id="app"></div>
</div>

<script>
/* ===== helpers ===== */
function rint(a,b){return Math.floor(Math.random()*(b-a+1))+a}
function pick(arr){return arr[rint(0,arr.length-1)]}
function shuffle(a){a=a.slice();for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]]}return a}
function frac(n,d){ // simplify and return string like "3/2"
  const g=(function gcd(a,b){a=Math.abs(a);b=Math.abs(b);while(b){[a,b]=[b,a%b]}return a||1})(n,d);
  const nn=n/g, dd=d/g; return dd===1?(''+nn):(nn+'/'+dd);
}
function approx(v){return Math.round(v*100)/100}

/* build exactly 4 distinct choices: correct + distractors, dedup, top up if needed */
function mc(correct, distractors, makeExtra){
  const seen=new Set([correct]);
  const out=[correct];
  for(const d of distractors){ if(!seen.has(d)){ seen.add(d); out.push(d); } }
  let guard=0;
  while(out.length<4 && guard++<50){ const e=makeExtra(); if(e!==null && !seen.has(e)){ seen.add(e); out.push(e); } }
  return {choices:shuffle(out.slice(0,4)), correct};
}

/* small SVG figure helpers (simple, schematic) */
const FIG={
 paraDiag:(a,b)=>`<svg class="fig" viewBox="0 0 220 130"><polygon points="30,30 160,30 190,100 60,100" fill="none" stroke="#B86AD9" stroke-width="2"/><line x1="30" y1="30" x2="190" y2="100" stroke="#E0518F" stroke-width="1.5"/><line x1="160" y1="30" x2="60" y2="100" stroke="#E0518F" stroke-width="1.5"/><circle cx="110" cy="65" r="3" fill="#E0518F"/><text x="22" y="28" font-size="11">B</text><text x="162" y="28" font-size="11">C</text><text x="192" y="104" font-size="11">D</text><text x="48" y="104" font-size="11">A</text><text x="114" y="60" font-size="10">E</text></svg>`,
 rhombus:()=>`<svg class="fig" viewBox="0 0 180 160"><polygon points="90,15 160,80 90,145 20,80" fill="none" stroke="#B86AD9" stroke-width="2"/><line x1="90" y1="15" x2="90" y2="145" stroke="#E0518F" stroke-width="1.3"/><line x1="20" y1="80" x2="160" y2="80" stroke="#E0518F" stroke-width="1.3"/><text x="86" y="12" font-size="11">A</text><text x="163" y="84" font-size="11">B</text><text x="86" y="158" font-size="11">C</text><text x="6" y="84" font-size="11">D</text><text x="95" y="78" font-size="9">E</text></svg>`,
 circleCenter:(ang)=>`<svg class="fig" viewBox="0 0 160 160"><circle cx="80" cy="80" r="60" fill="none" stroke="#3A2030" stroke-width="2"/><line x1="80" y1="80" x2="80" y2="20" stroke="#3A2030" stroke-width="1.5"/><line x1="80" y1="80" x2="140" y2="80" stroke="#3A2030" stroke-width="1.5"/><line x1="80" y1="80" x2="26" y2="115" stroke="#3A2030" stroke-width="1.5"/><text x="56" y="92" font-size="10">x°</text><text x="84" y="100" font-size="9">${ang}°</text></svg>`,
};

/* ============================================================
   PROBLEM GENERATORS  (نفس السؤال والقانون، أرقام عشوائية)
   each: {law, gen()-> {text, ans|choices, unit, steps, fig?}}
   ============================================================ */
const P={};

/* 1) مجموع زوايا مضلع */
P.polysum={law:'مجموع زوايا مضلع:  S = (n − 2) × 180°', gen(){
  const n=rint(5,30); const ans=(n-2)*180;
  return {unit:'°', ans, text:`ما مجموع قياسات الزوايا الداخلية لمضلع عدد أضلاعه <b>${n}</b>؟`,
   steps:[`S = (n − 2) × 180`,`S = (${n} − 2) × 180`,`S = ${n-2} × 180`,`S = ${ans}°`]};
}};

/* 2) عدد أضلاع من الزاوية الخارجية */
P.polyn={law:'عدد الأضلاع:  n = 360 ⁄ (الزاوية الخارجية)', gen(){
  const n=pick([3,4,5,6,8,9,10,12]); const ext=360/n;
  return {unit:'', ans:n, text:`مضلع منتظم قياس زاويته الخارجية <b>${ext}</b>°. كم عدد أضلاعه؟`,
   steps:[`n = 360 ⁄ (الزاوية الخارجية)`,`n = 360 ⁄ ${ext}`,`n = ${n}`]};
}};

/* 3) متوازي أضلاع: القطر ينصّف */
P.paraDiag={law:'في متوازي الأضلاع، القطران ينصّف كل منهما الآخر  ⟹  BE = ED', gen(){
  const a1=2, a2=5; // BE = 2x + b1 , ED = 5x + b2 , equal
  const xv=rint(3,10); const bb1=rint(3,9); const bb2=bb1-(a2-a1)*xv; // ensures integer x>0
  const BE=a1*xv+bb1; const BD=2*BE;
  return {unit:'', ans:BD, text:`ABCD متوازي أضلاع، قطراه يتقاطعان في E. إذا كان <b>BE = ${a1}x + ${bb1}</b> و <b>ED = ${a2}x ${bb2>=0?'+ '+bb2:'− '+(-bb2)}</b>، فأوجد طول القطر BD.`,
   fig:FIG.paraDiag(),
   steps:[`القطران ينصّف كل منهما الآخر ⟹ BE = ED`,`${a1}x + ${bb1} = ${a2}x ${bb2>=0?'+ '+bb2:'− '+(-bb2)}`,`x = ${xv}`,`BE = ${a1}×${xv} + ${bb1} = ${BE}`,`BD = 2 × BE = ${BD}`]};
}};

/* 4) مستطيل: تساوي القطرين */
P.rectDiag={law:'في المستطيل، القطران متساويان  ⟹  AC = BD', gen(){
  // AC = 5x + 2, BD = x + k  ; 5x+2 = x+k -> x = (k-2)/4
  const xv=rint(3,12); const k=4*xv+2;
  return {unit:'', ans:xv, text:`ABCD مستطيل، إذا كان <b>AC = 5x + 2</b> و <b>BD = x + ${k}</b>، فأوجد قيمة x.`,
   steps:[`القطران متساويان ⟹ AC = BD`,`5x + 2 = x + ${k}`,`4x = ${k-2}`,`x = ${xv}`]};
}};

/* 5) معين: نظرية فيثاغورس على نصفي القطرين */
P.rhombus={law:'في المعين القطران متعامدان  ⟹  (الضلع)² = (نصف قطر)² + (نصف قطر)²', gen(){
  const tr=pick([[3,4,5],[6,8,10],[5,12,13],[8,15,17]]); // half-diag1, half-diag2, side
  const AB=tr[2], ED=tr[1]; const AE=tr[0];
  return {unit:'', ans:AE, text:`في المعين ABCD يتقاطع قطراه في E. إذا كان <b>AB = ${AB}</b> و <b>ED = ${ED}</b>، فأوجد AE.`,
   fig:FIG.rhombus(),
   steps:[`القطران متعامدان ⟹ AB² = AE² + ED²`,`${AB}² = AE² + ${ED}²`,`${AB*AB} − ${ED*ED} = AE²`,`AE² = ${AB*AB-ED*ED}`,`AE = ${AE}`]};
}};

/* 6) متوازي أضلاع: الزوايا المتجاورة متكاملة */
P.paraAngle={law:'في متوازي الأضلاع، الزاويتان المتجاورتان متكاملتان  ⟹  ∠D + ∠B = 180°', gen(){
  const B=rint(40,140); const D=180-B;
  return {unit:'°', ans:D, text:`في متوازي أضلاع، قياس إحدى الزوايا <b>${B}</b>°. ما قياس الزاوية المجاورة لها؟`,
   steps:[`الزاويتان المتجاورتان متكاملتان`,`∠D = 180 − ${B}`,`∠D = ${D}°`]};
}};

/* 7) مربع/معين: فيثاغورس ضلعان متساويان -> القطر = 5√2 شكل */
P.iso45={law:'مثلث قائم ضلعاه متساويان:  الوتر = الضلع × √2', gen(){
  const s=rint(3,9);
  return {unit:'', isText:true, ans:`${s}√2`, accept:[`${s}root2`,`${s}sqrt2`], approxVal:approx(s*Math.SQRT2),
   text:`إذا كان RE = ${s} و DR = ${s} والزاوية بينهما قائمة، فأوجد FE (الوتر). اكتبي الجواب بصيغة الجذر مثل <b>${s}√2</b>`,
   steps:[`x² = ${s}² + ${s}²`,`x² = ${s*s} + ${s*s} = ${2*s*s}`,`x = √${2*s*s}`,`x = ${s}√2`]};
}};

/* 8) منتصف القطرين -> إيجاد إحداثيات D (متوازي أضلاع) */
P.midpoint={law:'منتصف القطرين متطابق:  منتصف AC = منتصف BD', gen(){
  // A, B, C given; find D = A + C - B
  const A=[rint(-4,0),rint(1,5)], B=[rint(2,5),rint(2,6)], C=[rint(1,5),rint(0,3)];
  const D=[A[0]+C[0]-B[0], A[1]+C[1]-B[1]];
  const correct=`(${D[0]}, ${D[1]})`;
  const m=mc(correct,[`(${D[0]+1}, ${D[1]})`,`(${D[0]}, ${D[1]-2})`,`(${B[0]}, ${B[1]})`], ()=>`(${D[0]+rint(-3,3)}, ${D[1]+rint(-3,3)})`);
  return {choices:m.choices, correct,
   text:`النقاط A(${A[0]}, ${A[1]})، B(${B[0]}, ${B[1]})، C(${C[0]}, ${C[1]}) تمثل رؤوس متوازي أضلاع ABCD. ما إحداثيات النقطة D؟`,
   steps:[`منتصف AC = منتصف BD`,`D = A + C − B`,`D = (${A[0]}+${C[0]}−${B[0]}, ${A[1]}+${C[1]}−${B[1]})`,`D = ${correct}`]};
}};

/* 9) الزاوية الخارجية لمضلع منتظم */
P.extAngle={law:'الزاوية الخارجية لمضلع منتظم:  360 ⁄ n', gen(){
  const n=pick([3,4,5,6,8,9,10,12]); const ans=360/n;
  return {unit:'°', ans, text:`ما قياس الزاوية الخارجية في المضلع المنتظم ذي الـ <b>${n}</b> أضلاع؟`,
   steps:[`الزاوية الخارجية = 360 ⁄ n`,`= 360 ⁄ ${n}`,`= ${ans}°`]};
}};

/* 10) معامل التشابه من المحيطين */
P.simRatio={law:'معامل التشابه = نسبة المحيطين', gen(){
  const k=pick([[3,2],[4,3],[5,2],[5,3],[5,4],[7,4],[2,1]]); const m=rint(6,12);
  const p1=k[0]*m, p2=k[1]*m;
  return {unit:'', isText:true, ans:frac(p1,p2), approxVal:approx(p1/p2),
   text:`المستطيل ABCD ~ المستطيل EFGH. محيط ABCD = <b>${p1}</b> cm ومحيط EFGH = <b>${p2}</b> cm. ما معامل تشابه ABCD إلى EFGH؟ (اكتبي كسر مثل 3/2)`,
   steps:[`معامل التشابه = محيط₁ ⁄ محيط₂`,`= ${p1} ⁄ ${p2}`,`= ${frac(p1,p2)}`]};
}};

/* 11) تناسب الظل (الشجرة) */
P.shadow={law:'تناسب:  (طول الطالب)⁄(ظل الطالب) = (ارتفاع الشجرة)⁄(ظل الشجرة)', gen(){
  const h=rint(4,7); const sh=rint(3,6); const treeSh=sh*rint(7,14); const tree=h*treeSh/sh;
  return {unit:'ft', ans:approx(tree), text:`يقف طالب طوله <b>${h}</b> ft بجوار شجرة. عندما كان طول ظله <b>${sh}</b> ft كان طول ظل الشجرة <b>${treeSh}</b> ft. فما ارتفاع الشجرة؟`,
   steps:[`الطول ⁄ الظل = الطول ⁄ الظل`,`${h} ⁄ ${sh} = x ⁄ ${treeSh}`,`x = ${h} × ${treeSh} ⁄ ${sh}`,`x = ${approx(tree)} ft`]};
}};

/* 12 & 13 & 15) تناسب أضلاع متشابهة (a/b = c/x) */
P.proportion={law:'في الأشكال المتشابهة الأضلاع متناسبة:  a⁄b = c⁄x', gen(){
  const a=rint(2,6); const f=rint(2,5); const b=a*f; const c=rint(3,9); const x=c*f;
  return {unit:'', ans:x, text:`في شكلين متشابهين: <b>${a}</b> ⁄ <b>${b}</b> = <b>${c}</b> ⁄ x. أوجدي قيمة x.`,
   steps:[`a ⁄ b = c ⁄ x`,`${a} ⁄ ${b} = ${c} ⁄ x`,`x = ${b} × ${c} ⁄ ${a}`,`x = ${x}`]};
}};

/* 14) قطعة منتصفة (Midsegment): DE = ½ AC */
P.midseg={law:'القطعة المتوسطة:  DE = ½ × AC  ⟹  AC = 2 × DE', gen(){
  const de=rint(5,15); const ac=2*de;
  return {unit:'', ans:ac, text:`DE قطعة متوسطة في المثلث ABC وتوازي AC. إذا كان <b>DE = ${de}</b>، فأوجد طول AC.`,
   steps:[`DE = ½ × AC`,`${de} = ½ × AC`,`AC = 2 × ${de}`,`AC = ${ac}`]};
}};

/* 16) انعكاس حول محور y */
P.reflectY={law:'الانعكاس حول المحور y:  (x, y) → (−x, y)', gen(){
  const x=rint(-6,6)||3, y=rint(-6,6)||(-3);
  const correct=`(${-x}, ${y})`;
  const m=mc(correct,[`(${x}, ${-y})`,`(${-x}, ${-y})`,`(${y}, ${x})`], ()=>`(${rint(-6,6)}, ${rint(-6,6)})`);
  return {choices:m.choices, correct,
   text:`ما صورة النقطة (${x}, ${y}) بالانعكاس حول المحور y؟`,
   steps:[`الانعكاس حول y: (x, y) → (−x, y)`,`(${x}, ${y}) → (${-x}, ${y})`]};
}};

/* 19) إزاحة (translation) */
P.translate={law:'الإزاحة:  (x, y) → (x + a, y + b)', gen(){
  const x=rint(1,6), y=rint(1,6), a=rint(-5,5), b=rint(-5,5);
  const correct=`(${x+a}, ${y+b})`;
  const m=mc(correct,[`(${x-a}, ${y+b})`,`(${x+a}, ${y-b})`,`(${x+b}, ${y+a})`], ()=>`(${x+rint(-5,5)}, ${y+rint(-5,5)})`);
  return {choices:m.choices, correct,
   text:`ما صورة النقطة (${x}, ${y}) تحت تأثير الإزاحة (x ${a>=0?'+ '+a:'− '+(-a)}, y ${b>=0?'+ '+b:'− '+(-b)})؟`,
   steps:[`(x, y) → (x ${a>=0?'+ '+a:'− '+(-a)}, y ${b>=0?'+ '+b:'− '+(-b)})`,`(${x}, ${y}) → ${correct}`]};
}};

/* 20) دوران 90° عكس عقارب الساعة */
P.rotate90={law:'الدوران 90° عكس عقارب الساعة:  (x, y) → (−y, x)', gen(){
  const x=rint(1,7), y=rint(1,7);
  const correct=`(${-y}, ${x})`;
  const m=mc(correct,[`(${y}, ${-x})`,`(${-x}, ${-y})`,`(${y}, ${x})`], ()=>`(${rint(-7,7)}, ${rint(-7,7)})`);
  return {choices:m.choices, correct,
   text:`ما صورة النقطة (${x}, ${y}) بالدوران بزاوية 90° عكس عقارب الساعة حول نقطة الأصل؟`,
   steps:[`دوران 90° عكس الساعة: (x, y) → (−y, x)`,`(${x}, ${y}) → ${correct}`]};
}};

/* 22) التماثل الدوراني لمضلع منتظم */
P.rotSym={law:'مقدار التماثل الدوراني لمضلع منتظم:  360 ⁄ n', gen(){
  const n=pick([3,4,5,6,8,9,10,12]); const ans=360/n;
  return {unit:'°', ans, text:`ما مقدار التماثل الدوراني لمضلع منتظم عدد أضلاعه <b>${n}</b> حول مركزه؟`,
   steps:[`= 360 ⁄ n`,`= 360 ⁄ ${n}`,`= ${ans}°`]};
}};

/* 23) زاوية بين مستقيمين من تركيب انعكاسين */
P.twoReflect={law:'زاوية الدوران الناتجة = 2 × الزاوية بين المستقيمين  ⟹  الزاوية = (زاوية الدوران) ⁄ 2', gen(){
  const half=rint(20,70); const full=2*half;
  return {unit:'°', ans:half, text:`نتج عن تركيب انعكاسين حول مستقيمين متقاطعين دوران بزاوية قياسها <b>${full}</b>°. ما قياس الزاوية الحادة بين المستقيمين؟`,
   steps:[`الزاوية = (زاوية الدوران) ⁄ 2`,`= ${full} ⁄ 2`,`= ${half}°`]};
}};

/* 25) نصف القطر من المحيط */
P.radiusCirc={law:'محيط الدائرة:  C = 2πr  ⟹  r = C ⁄ (2π)', gen(){
  const r=rint(3,12); const C=approx(2*Math.PI*r);
  return {unit:'m', ans:r, tol:0.9, text:`حوض سباحة دائري محيطه <b>${C}</b> m. أوجدي طول نصف قطره مقرباً لأقرب عدد صحيح.`,
   steps:[`C = 2πr`,`r = C ⁄ (2π)`,`r = ${C} ⁄ (2 × 3.14)`,`r ≈ ${r} m`]};
}};

/* 26) تمدد بمعامل (dilation) */
P.dilation={law:'التمدد بمعامل k:  (x, y) → (kx, ky)', gen(){
  const k=pick([['1/2',0.5],['1/3',1/3],['2',2],['3',3],['-1/2',-0.5]]);
  const x=rint(-6,6)||4, y=rint(-6,6)||(-2);
  const rx=k[1]*x, ry=k[1]*y;
  const fmt=v=>v%1===0?(''+v):(''+approx(v));
  const correct=`(${fmt(rx)}, ${fmt(ry)})`;
  const m=mc(correct,[`(${fmt(rx+1)}, ${fmt(ry)})`,`(${fmt(k[1]*y)}, ${fmt(k[1]*x)})`,`(${x}, ${y})`], ()=>`(${fmt(k[1]*rint(-6,6))}, ${fmt(k[1]*rint(-6,6))})`);
  return {choices:m.choices, correct,
   text:`ما صورة النقطة (${x}, ${y}) بتمدد معامله <b>${k[0]}</b>؟`,
   steps:[`(x, y) → (kx, ky)`,`k = ${k[0]}`,`(${x}, ${y}) → ${correct}`]};
}};

/* 27) زاوية مركزية ناقصة (مجموع 360) */
P.centralAngle={law:'مجموع الزوايا حول المركز = 360°', gen(){
  const a=90; const b=rint(100,160); const x=360-a-b;
  return {unit:'°', ans:x, fig:FIG.circleCenter(b),
   text:`زوايا تلتقي عند مركز دائرة: إحداها <b>90</b>°، وأخرى <b>${b}</b>°. ما قيمة x (الزاوية الثالثة)؟`,
   steps:[`المجموع حول المركز = 360°`,`x = 360 − (90 + ${b})`,`x = 360 − ${90+b}`,`x = ${x}°`]};
}};

/* 28) مركز دائرة من المعادلة */
P.circleCenter={law:'معادلة الدائرة:  (x − h)² + (y − k)² = r²  ⟹  المركز (h, k)', gen(){
  const h=rint(-5,5), k=rint(-5,5), r=rint(2,6);
  const hs=h>=0?`(x − ${h})²`:`(x + ${-h})²`;
  const ks=k>=0?`(y − ${k})²`:`(y + ${-k})²`;
  const correct=`(${h}, ${k})`;
  const m=mc(correct,[`(${-h}, ${-k})`,`(${h}, ${-k})`,`(${k}, ${h})`], ()=>`(${rint(-5,5)}, ${rint(-5,5)})`);
  return {choices:m.choices, correct,
   text:`ما مركز الدائرة التي معادلتها <b>${hs} + ${ks} = ${r*r}</b>؟`,
   steps:[`(x − h)² + (y − k)² = r²`,`h = ${h}, k = ${k}`,`المركز = ${correct}`]};
}};

/* 29) زاويتان محيطيتان تطلان على نفس القوس متساويتان */
P.inscribedEq={law:'الزاويتان المحيطيتان المطلتان على القوس نفسه متساويتان  ⟹  ∠1 = ∠2', gen(){
  // m∠1 = 2x + b1 , m∠2 = 3x − c , equal -> 3x − c = 2x + b1 -> x = b1 + c
  const b1=rint(5,15); const c=rint(4,14); const xv=b1+c;
  return {unit:'', ans:xv, text:`في الشكل، ∠1 و ∠2 زاويتان محيطيتان تطلان على القوس نفسه. إذا كان <b>m∠1 = 2x + ${b1}</b> و <b>m∠2 = 3x − ${c}</b>، فأوجد قيمة x.`,
   steps:[`الزاويتان المطلتان على نفس القوس متساويتان`,`3x − ${c} = 2x + ${b1}`,`3x − 2x = ${b1} + ${c}`,`x = ${xv}`]};
}};

/* 30) الزاوية المماسية = نصف القوس فرق (شكل المماس) */
P.tangentChord={law:'زاوية بين مماسين (أو مماس ووتر) = ½ × فرق القوسين', gen(){
  const arc=rint(80,160); const ans=arc/2 - rint(10,30);
  // keep simple: x = (arcBig - arcSmall)/2 style; pick clean
  const big=rint(120,200); const small=rint(40,100); const x=(big-small)/2;
  return {unit:'°', ans:Math.round(x), text:`زاوية رأسها خارج الدائرة تحصرها مماسان. إذا كان القوس البعيد <b>${big}</b>° والقريب <b>${small}</b>°، فما قياس الزاوية x؟`,
   steps:[`x = ½ × (القوس البعيد − القوس القريب)`,`x = ½ × (${big} − ${small})`,`x = ½ × ${big-small}`,`x = ${Math.round(x)}°`]};
}};

/* 31) مماس عمودي على نصف القطر -> فيثاغورس لإيجاد نصف القطر */
P.tangentRadius={law:'المماس ⊥ نصف القطر  ⟹  فيثاغورس:  (نصف القطر)² + (المماس)² = (الوتر)²', gen(){
  const tr=pick([[6,8,10],[5,12,13],[8,15,17],[3,4,5]]); // r, tangent, hyp
  const r=tr[0], tan=tr[1], hyp=tr[2];
  return {unit:'cm', ans:r, text:`AB مماس للدائرة M. إذا كان طول المماس <b>${tan}</b> cm والمسافة من النقطة الخارجية لمركز الدائرة <b>${hyp}</b> cm، فما طول نصف القطر؟`,
   steps:[`المماس ⊥ نصف القطر`,`r² + ${tan}² = ${hyp}²`,`r² = ${hyp*hyp} − ${tan*tan} = ${hyp*hyp-tan*tan}`,`r = ${r} cm`]};
}};

/* 33) وتران متساويان متساويا البعد عن المركز */
P.equalChords={law:'الوتران المتساويان يبعدان بُعداً متساوياً عن المركز  ⟹  CF = ½ × CD = ½ × AB', gen(){
  const ab=pick([8,10,12,14,16]); const ans=ab/2;
  return {unit:'cm', ans, text:`في الدائرة O: الوتر <b>AB = ${ab}</b> cm، و OE = OF (الوتران متساويان في البعد). أوجدي CF (نصف الوتر CD).`,
   steps:[`الوتران المتساويان متساويان في البعد ⟹ CD = AB`,`CF = ½ × CD = ½ × ${ab}`,`CF = ${ans} cm`]};
}};

/* 34) طول قوس */
P.arcLength={law:'طول القوس:  L = (الزاوية ⁄ 360) × 2πr', gen(){
  const ang=pick([30,45,60,90,120,180]); const r=rint(2,8); const L=approx(ang/360*2*Math.PI*r);
  return {unit:'m', ans:L, tol:0.2, text:`في الدائرة R، أوجدي طول القوس PQ إذا كانت الزاوية المركزية <b>${ang}</b>° ونصف القطر <b>${r}</b> m. (قرّبي لأقرب جزء من مئة)`,
   steps:[`L = (الزاوية ⁄ 360) × 2πr`,`L = (${ang} ⁄ 360) × 2 × 3.14 × ${r}`,`L ≈ ${L} m`]};
}};

/* 35) إيجاد ضلع من معامل التشابه */
P.simSide={law:'معامل التشابه = نسبة الأضلاع المتناظرة', gen(){
  const k=pick([[4,3],[3,2],[5,4],[5,3]]); const base=k[1]*rint(4,9); const ans=approx(k[0]*base/k[1]);
  return {unit:'', ans, tol:0.1, text:`المثلث LMN ~ المثلث RST، ومعامل التشابه من RST إلى LMN يساوي <b>${k[0]}/${k[1]}</b>. إذا كان الضلع المناظر في RST = <b>${base}</b>، فأوجد ST.`,
   steps:[`النسبة = ${k[0]} ⁄ ${k[1]}`,`ST = (${k[0]} ⁄ ${k[1]}) × ${base}`,`ST = ${ans}`]};
}};

/* 37) قطر المربع ينصّف الزاوية -> 45 */
P.squareDiag={law:'قطر المربع ينصّف الزاوية القائمة (90°)  ⟹  45°', gen(){
  return {unit:'°', ans:45, text:`في المربع PQRS، قطره ينصّف الزاوية القائمة. أوجدي m∠PRS.`,
   steps:[`قطر المربع ينصّف الزاوية القائمة`,`m∠PRS = 90 ⁄ 2`,`= 45°`]};
}};

/* 38) الزاوية المحيطية = نصف القوس -> القوس = 2× الزاوية */
P.inscribedArc={law:'القوس = 2 × الزاوية المحيطية المقابلة له', gen(){
  const ang=rint(30,85); const arc=2*ang;
  return {unit:'°', ans:arc, text:`زاوية محيطية قياسها <b>${ang}</b>° تطل على القوس CB. ما قياس القوس CB؟`,
   steps:[`الزاوية المحيطية = ½ × القوس`,`القوس = 2 × ${ang}`,`= ${arc}°`]};
}};

/* 39) مماس وقاطع: x² = (الكل)(الخارجي) */
P.secantTangent={law:'مماس وقاطع:  (المماس)² = (القاطع الكامل) × (الجزء الخارجي)', gen(){
  const out=rint(3,6); const ins=rint(3,7); const whole=out+ins; const v=out*whole;
  // x = sqrt(out*whole); show as root if not perfect
  const isPerf=Number.isInteger(Math.sqrt(v));
  return {unit:'', isText:true, ans:isPerf?(''+Math.sqrt(v)):`√${v}`, approxVal:approx(Math.sqrt(v)),
   text:`من نقطة خارج الدائرة: مماس طوله x، وقاطع جزؤه الخارجي <b>${out}</b> والداخلي <b>${ins}</b>. أوجدي x. ${isPerf?'':'(بصيغة الجذر √'+v+' أو القيمة التقريبية)'}`,
   steps:[`x² = (القاطع الكامل) × (الخارجي)`,`x² = (${out} + ${ins}) × ${out}`,`x² = ${whole} × ${out} = ${v}`,`x = ${isPerf?Math.sqrt(v):'√'+v}`]};
}};

/* 40) وتران متقاطعان: حاصل ضرب الأجزاء متساوٍ */
P.twoChords={law:'الوتران المتقاطعان:  (جزء₁)(جزء₂) = (جزء₃)(جزء₄)', gen(){
  const A=rint(2,6), B=rint(2,8); const PD=A*B;
  const divisors=[]; for(let d=2;d<=PD;d++){ if(PD%d===0) divisors.push(d); }
  const Cv=pick(divisors); const X=PD/Cv;
  return {unit:'', ans:X, text:`وتران متقاطعان داخل دائرة: أجزاء الأول <b>${A}</b> و <b>${B}</b>، وأجزاء الثاني <b>${Cv}</b> و x. أوجدي x.`,
   steps:[`(جزء₁)(جزء₂) = (جزء₃)(جزء₄)`,`${A} × ${B} = ${Cv} × x`,`${PD} = ${Cv}x`,`x = ${X}`]};
}};

/* ============================================================
   CHAPTERS
   ============================================================ */
const CHAPTERS=[
 {id:'poly', ico:'⬠', title:'المضلعات والرباعيات', sub:'Polygons & Quadrilaterals',
  probs:[P.polysum,P.polyn,P.paraDiag,P.rectDiag,P.rhombus,P.paraAngle,P.iso45,P.midpoint,P.extAngle,P.squareDiag]},
 {id:'sim', ico:'△', title:'التشابه والتناسب', sub:'Similarity & Proportion',
  probs:[P.simRatio,P.shadow,P.proportion,P.midseg,P.simSide]},
 {id:'trans', ico:'🔄', title:'التحويلات الهندسية', sub:'Transformations',
  probs:[P.reflectY,P.translate,P.rotate90,P.rotSym,P.twoReflect,P.dilation]},
 {id:'circ', ico:'⭕', title:'الدوائر', sub:'Circles',
  probs:[P.radiusCirc,P.centralAngle,P.circleCenter,P.inscribedEq,P.tangentChord,P.tangentRadius,P.equalChords,P.arcLength,P.inscribedArc,P.secantTangent,P.twoChords]},
];

/* ===== state ===== */
const app=document.getElementById('app');
const progress={};
let cur=null, items=[], idx=0, score=0, curP=null;

function home(){
  let cards='';
  CHAPTERS.forEach(c=>{
    const p=progress[c.id];
    let badge='';
    if(p!==undefined) badge=`<span class="badge ${p>=80?'done':'half'}">${p>=80?'ممتاز ✓':'كمّلي 💪'}</span>`;
    cards+=`<div class="card" onclick="openCh('${c.id}')">
      <div class="ico">${c.ico}</div>
      <h3>${c.title}</h3><div class="sub">${c.sub}</div>
      <div class="meta"><span>${c.probs.length} نوع مسألة</span>${badge}</div>
    </div>`;
  });
  app.innerHTML=`
    <div class="sechead">💜 اختاري الفصل اللي تبغين تتمرنين عليه</div>
    <div class="grid">${cards}</div>
    <div class="intro">كل مسألة نفس فكرة المراجعة بالضبط، بس الأرقام تتغير كل مرة 🌟<br>اكتبي جوابك ويصحح لك ويعرض خطوات الحل خطوة خطوة ✍️</div>`;
}

function openCh(id){ cur=CHAPTERS.find(c=>c.id===id); items=shuffle(cur.probs); idx=0; score=0; renderP(); }

function renderP(){
  if(idx>=items.length){
    const pct=Math.round(score/items.length*100);
    progress[cur.id]=pct;
    app.innerHTML=`
      <button class="backbtn" onclick="home()">→ رجوع</button>
      <div class="qbox scorebox">
        <div class="big">${score}/${items.length}</div>
        <p style="margin:12px 0 4px">${pct>=80?'ما شاء الله عليك! 🌟':'راجعي وكرري، بتضبطين 💪'}</p>
        <div class="actions center"><button class="primary" onclick="openCh('${cur.id}')">مسائل جديدة ↻</button><button class="ghost" onclick="home()">رجوع</button></div>
      </div>`;
    return;
  }
  curP=items[idx].gen();
  const law=items[idx].law;
  const isChoice=!!curP.choices;
  let answerArea;
  if(isChoice){
    answerArea=`<div class="choices" id="ch">${curP.choices.map((c,i)=>`<button class="choice" onclick="ansChoice(${i})">${c}</button>`).join('')}</div>`;
  } else {
    answerArea=`<div class="answerrow">
      <label>الجواب =</label>
      <input id="ans" type="text" inputmode="text" placeholder="..." autocomplete="off">
      <span class="unit">${curP.unit||''}</span>
    </div>
    <div class="actions"><button class="primary" onclick="ansInput()">تأكدي ✓</button><button class="ghost" onclick="renderP()">مسألة ثانية ↻</button></div>`;
  }
  app.innerHTML=`
    <button class="backbtn" onclick="home()">→ رجوع</button>
    <h2 class="topic-title">${cur.ico} ${cur.title}</h2>
    <div class="qcount">مسألة ${idx+1} / ${items.length}</div>
    <div class="qbox">
      <div class="problem">${curP.text}${curP.fig||''}</div>
      <div class="lawbox">📐 ${law}</div>
      ${answerArea}
      <div class="solution" id="sol"></div>
    </div>`;
  if(!isChoice) setTimeout(()=>{const a=document.getElementById('ans');if(a)a.focus();},50);
}

function showSol(ok,correctText){
  const sol=document.getElementById('sol');
  sol.className='solution show '+(ok?'ok':'no');
  sol.innerHTML=`<b>${ok?'✅ إجابة صحيحة!':'❌ غير صحيحة. الإجابة الصحيحة: '+correctText}</b>
    <div style="margin-top:8px;font-size:13px;color:var(--muted)">طريقة الحل:</div>
    ${curP.steps.map(s=>`<div class="step">${s}</div>`).join('')}
    <button class="primary nextbtn" onclick="idx++;renderP()">${idx+1>=items.length?'النتيجة 🎉':'المسألة الجاية ←'}</button>`;
  if(ok) score++;
}

function ansChoice(i){
  const btns=document.querySelectorAll('#ch .choice');
  btns.forEach(b=>b.disabled=true);
  const chosen=curP.choices[i];
  btns.forEach((b,bi)=>{ if(curP.choices[bi]===curP.correct) b.classList.add('correct'); });
  const ok = chosen===curP.correct;
  if(!ok) btns[i].classList.add('wrong');
  showSol(ok, curP.correct);
}

function normTxt(s){return (s||'').toLowerCase().replace(/\s+/g,'').replace(/√/g,'root').replace(/sqrt/g,'root').replace(/\*/g,'').replace(',', '.')}
function ansInput(){
  const raw=document.getElementById('ans').value.trim();
  document.getElementById('ans').disabled=true;
  let ok=false;
  if(curP.isText){
    const want=normTxt(curP.ans);
    const got=normTxt(raw);
    ok = got===want || (curP.accept||[]).some(a=>normTxt(a)===got);
    // also accept approx numeric
    if(!ok && curP.approxVal!==undefined){ const v=parseFloat(raw.replace(',','.')); if(!isNaN(v) && Math.abs(v-curP.approxVal)<=0.1) ok=true; }
    showSol(ok, curP.ans+(curP.unit?' '+curP.unit:''));
  } else {
    const v=parseFloat(raw.replace(',','.'));
    const tol=curP.tol!==undefined?curP.tol:Math.max(0.05,Math.abs(curP.ans)*0.01);
    ok = !isNaN(v) && Math.abs(v-curP.ans)<=tol;
    showSol(ok, curP.ans+(curP.unit?' '+curP.unit:''));
  }
}

home();
</script>
